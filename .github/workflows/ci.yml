name: Selenium UI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'oracle'
          cache: maven

      - name: Create Reports Directory
        # This ensures the directory exists before the tests run
        run: mkdir -p reports

      - name: Run All Selenium Tests
        # Added -Duser.dir to ensure Java knows exactly where it is
        run: mvn clean test "-DsuiteXmlFile=src/test/java/testCases/Grouping.xml" -Dbrowser=chrome -Doperator=linux

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-Test-Report
          path: reports/
          if-no-files-found: error
