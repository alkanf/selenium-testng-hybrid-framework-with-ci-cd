name: Selenium UI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24' # 
          distribution: 'oracle' # 
          cache: maven

      - name: Run All Selenium Tests
        run: mvn clean test -DsuiteXmlFile=src/test/java/testCases/Grouping.xml -Dbrowser=chrome -Doperator=linux

      - name: Upload Extent Report and Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-Test-Results
          path: |
            reports/
            screenshots/
