name: Selenium UI Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'oracle'
          cache: maven

      - name: Run Tests
        # We don't use 'mkdir' anymore because Java code will handle it inside target/
        run: mvn clean test "-DsuiteXmlFile=src/test/java/testCases/Grouping.xml" -Dbrowser=chrome -Doperator=linux
        continue-on-error: true

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Extent-Test-Reports
          # Looking into target/reports specifically
          path: target/reports/
          if-no-files-found: warn
