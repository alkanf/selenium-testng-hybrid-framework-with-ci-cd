name: Selenium UI Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Tests
        run: mvn test -Dbrowser=chrome-headless 
        # Not: Framework'ünde 'headless' parametresini okuyacak bir yapı kurmuş olmalısın.

      - name: Upload Report
        if: always() # Testler fail olsa bile raporu kaydetmek için
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
